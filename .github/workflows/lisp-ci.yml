name: Lisp CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t claw-lisp-dev .

      - name: Run Lisp tests
        run: docker run --rm -v "$PWD:/workspace" -w /workspace claw-lisp-dev make lisp-test
